#Test 8
name: 🚀 Deploy HRMS (Frontend + Flask Backend)

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------
  # 1️⃣ BACKEND TESTING
  # ---------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov
      
      - name: Run linting
        run: |
          pip install flake8
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
      
      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ -v || true

  # ---------------------------
  # 2️⃣ FRONTEND BUILDING
  # ---------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run linting
        run: |
          cd frontend
          npm run lint || true
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # ---------------------------
  # 3️⃣ FRONTEND DEPLOYMENT
  # ---------------------------
  frontend-deploy:
    name: Frontend Deployment
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🎨 Pulling latest frontend code..."
            cd ~/HRMS || exit 1
            git pull origin main
            cd ./frontend || exit 1
            npm install
            npm run build
            echo "✅ Frontend build complete."

  # ---------------------------
  # 4️⃣ BACKEND DEPLOYMENT
  # ---------------------------
  backend-deploy:
    name: Flask Backend Deployment
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-deploy]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Flask Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🧠 Pulling latest backend code..."
            cd ~/HRMS || exit 1
            git pull origin main
            cd ./backend || exit 1
            
            echo "🐍 Activating virtual environment..."
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate

            echo "📦 Installing dependencies..."
            pip install -r requirements.txt

            echo "🔁 Restarting Flask app..."
            # If using systemd
            if systemctl is-active --quiet hrms-backend.service; then
              sudo systemctl restart hrms-backend.service
            else
              # Fallback: restart manually
              pkill -f "python.*app.py" || true
              nohup gunicorn --bind 0.0.0.0:5000 app:app > app.log 2>&1 &
            fi
            
            echo "✅ Flask backend deployed successfully."
